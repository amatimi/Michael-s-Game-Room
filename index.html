<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben 10 Birthday Hub</title>
    <style>
        :root {
            --omnitrix-glow: #00ff00;
            --omnitrix-dark-glow: #006600;
            --bg-dark: #121212;
            --panel-bg: #1a1a1a;
            --text-light: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Navigation */
        header {
            background-color: #0a0a0a;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid var(--omnitrix-glow);
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.2);
            z-index: 10;
        }

        header h1 {
            color: #ffffff;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--omnitrix-glow);
        }

        header span {
            color: var(--omnitrix-glow);
        }

        /* Main Workspace Layout */
        .dashboard-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
            position: relative;
        }

        /* Central Game Window */
        .game-terminal {
            flex: 3;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle, #1a231a 0%, #0d0d0d 100%);
        }

        .terminal-header {
            background-color: #000;
            padding: 10px 15px;
            border-radius: 8px 8px 0 0;
            border: 1px solid var(--omnitrix-dark-glow);
            border-bottom: 2px solid var(--omnitrix-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: var(--omnitrix-glow);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--omnitrix-glow);
            animation: pulse 2s infinite;
        }

        .game-frame-container {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--omnitrix-dark-glow);
            border-top: none;
            border-radius: 0 0 8px 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Iframe placeholder for your actual game */
        .game-frame-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Fallback view before game loads */
        .game-placeholder {
            text-align: center;
            padding: 20px;
        }

        .omnitrix-btn {
            background-color: #000;
            color: var(--omnitrix-glow);
            border: 2px solid var(--omnitrix-glow);
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .omnitrix-btn:hover {
            background-color: var(--omnitrix-glow);
            color: #000;
            box-shadow: 0 0 20px var(--omnitrix-glow);
        }

        /* Sidebar for Video Call */
        .comms-sidebar {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background-color: var(--panel-bg);
            border-left: 2px solid var(--omnitrix-dark-glow);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--omnitrix-glow);
            border-bottom: 1px solid var(--omnitrix-dark-glow);
            padding-bottom: 5px;
        }

        .video-container {
            flex: 1;
            background-color: #000;
            border-radius: 6px;
            border: 1px dashed var(--omnitrix-glow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #666;
            text-align: center;
            padding: 20px;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.4; box-shadow: 0 0 4px var(--omnitrix-glow); }
            50% { opacity: 1; box-shadow: 0 0 12px var(--omnitrix-glow); }
            100% { opacity: 0.4; box-shadow: 0 0 4px var(--omnitrix-glow); }
        }

        /* Responsive Breakpoint for Mobile/Small Screens */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
                height: auto;
                overflow: y-scroll;
            }
            .comms-sidebar {
                max-width: 100%;
                min-width: 100%;
                height: 300px;
                border-left: none;
                border-top: 2px solid var(--omnitrix-dark-glow);
            }
            .game-terminal {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Plumber Command: <span>Ben's 2026 Birthday Hub</span></h1>
    </header>

    <div class="dashboard-container">
        
        <main class="game-terminal">
            <div class="terminal-header">
                <h3>Omnitrix Game Console</h3>
                <div class="status-dot" id="statusDot"></div>
            </div>
            <div class="game-frame-container" id="gameWindow">
                <div class="game-placeholder" id="placeholderText">
                    <p>System Online. Awaiting Alien Activation Sequence.</p>
                    <button class="omnitrix-btn" onclick="initializeGame()">Activate Trivia Game</button>
                </div>
            </div>
        </main>

        <aside class="comms-sidebar">
            <h3 class="sidebar-title">Comms Channel</h3>
            <div class="video-container" id="videoContainer">
                <p>⚡ Video Link Standby ⚡</p>
                <small style="margin-top: 10px; color: #888;">
                    Replace this area with a Discord Widget or an iframe from Jitsi Meet / Zoom.
                </small>
            </div>
        </aside>

    </div>

    <script>
        // Update this URL to point to your hosted trivia or card game
        const YOUR_GAME_URL = "https://amatimi.github.io/ben10-trivia/"; 

        function initializeGame() {
            const container = document.getElementById('gameWindow');
            
            // Seamlessly inject the game via an iframe
            container.innerHTML = `
                <iframe 
                    src="${YOUR_GAME_URL}" 
                    title="Ben 10 Custom Game"
                    allow="fullscreen">
                </iframe>
            `;
            
            // Visually change the dashboard status when active
            const dot = document.getElementById('statusDot');
            dot.style.backgroundColor = '#00ffff';
            dot.style.boxShadow = '0 0 12px #00ffff';
        }
    </script>
</body>
</html>
